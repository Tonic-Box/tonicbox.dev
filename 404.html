<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — TonicBox</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/style.css?v=19">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%230b0e14'/><text x='2' y='12' font-family='monospace' font-size='11' fill='%237aa2f7'>&gt;_</text></svg>">
</head>
<body>
  <main class="terminal">
    <div class="titlebar">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
      <span class="title">tonicbox@dev: ~</span>
    </div>

    <div class="screen">
      <p class="line"><span class="prompt">tonicbox@dev:~$</span> cat "$REQUEST_URI"</p>
      <p class="line output">cat: no such file or directory</p>
      <p class="line output name">404</p>
      <p class="line output status">[*] that page doesn't exist</p>

      <p class="line"><span class="prompt">tonicbox@dev:~$</span> <a class="link" href="/">cd ~</a></p>

      <p class="line"><span class="prompt">tonicbox@dev:~$</span> <span class="cursor"></span></p>
    </div>
  </main>

  <footer>
    <span>&copy; 2026 TonicBox</span>
  </footer>
</body>
</html>
